<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOTKUDA</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#080808;
color:white;
font-family:'Space Grotesk',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:800px;
height:800px;
background:radial-gradient(circle,#181818 0%,transparent 70%);
filter:blur(90px);
animation:move 10s ease-in-out infinite alternate;
}

@keyframes move{
0%{transform:translate(-200px,-100px);}
100%{transform:translate(200px,120px);}
}

.container{
position:relative;
z-index:2;
width:90%;
max-width:650px;
text-align:center;
}

h1{
font-size:72px;
font-weight:700;
letter-spacing:8px;
display:inline-block;
overflow:hidden;
white-space:nowrap;
border-right:3px solid white;
width:0;
animation:
typing 2.5s steps(7,end) forwards,
blink .8s infinite;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
50%{border-color:transparent;}
}

.subtitle{
margin-top:25px;
color:#9f9f9f;
font-size:18px;
opacity:0;
animation:fade 1s forwards;
animation-delay:2.2s;
}

form{
margin-top:45px;
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
opacity:0;
animation:fade 1s forwards;
animation-delay:2.6s;
}

input{
width:340px;
padding:18px 22px;
background:#131313;
border:1px solid #2b2b2b;
border-radius:50px;
color:white;
font-size:15px;
outline:none;
transition:.3s;
}

input:focus{
border-color:white;
}

button{
padding:18px 28px;
border:none;
background:white;
color:#111;
border-radius:50px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

.footer{
margin-top:35px;
font-size:13px;
color:#555;
opacity:0;
animation:fade 1s forwards;
animation-delay:3s;
}

.hidden{
display:none;
}

#thanks h2{
font-size:60px;
margin-bottom:20px;
}

#thanks p{
font-size:20px;
color:#999;
margin-bottom:40px;
}

#thanks button{
background:white;
}

@keyframes fade{
to{
opacity:1;
}
}

@media(max-width:700px){

h1{
font-size:50px;
letter-spacing:5px;
}

input,
button{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div id="landing">

<h1>H E Y  Y O U :)</h1>

<p class="subtitle">
Something exciting is coming.<br>
Join the waitlist.
</p>

<form id="waitlist">

<input
type="email"
placeholder="Enter your email"
required>

<button type="submit">
Join
</button>

</form>

<div class="footer">
© NOTKUDA
</div>

</div>

<div id="thanks" class="hidden">

<h2>✓</h2>

<h2>Thank You.</h2>

<p>
You're officially on the waitlist.
</p>

<button onclick="location.reload()">
Go Back
</button>

</div>

</div>

<script>

document.getElementById("waitlist").addEventListener("submit",function(e){

e.preventDefault();

document.getElementById("landing").classList.add("hidden");

document.getElementById("thanks").classList.remove("hidden");

});

</script>

</body>
</html>
