<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOT KUDA</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#080808;
color:white;
font-family:'Space Grotesk',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:800px;
height:800px;
background:radial-gradient(circle,#181818 0%,transparent 70%);
filter:blur(90px);
animation:move 10s ease-in-out infinite alternate;
}

@keyframes move{
0%{transform:translate(-200px,-100px);}
100%{transform:translate(200px,120px);}
}

.container{
position:relative;
z-index:2;
width:90%;
max-width:650px;
text-align:center;
}

h1{
font-size:72px;
font-weight:700;
letter-spacing:8px;
display:inline-block;
overflow:hidden;
white-space:nowrap;
border-right:3px solid white;
width:0;
animation:
typing 2.5s steps(7,end) forwards,
blink .8s infinite;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
50%{border-color:transparent;}
}

.subtitle{
margin-top:25px;
color:#9f9f9f;
font-size:18px;
opacity:0;
animation:fade 1s forwards;
animation-delay:2.2s;
}

form{
margin-top:45px;
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
opacity:0;
animation:fade 1s forwards;
animation-delay:2.6s;
}

input{
width:340px;
padding:18px 22px;
background:#131313;
border:1px solid #2b2b2b;
border-radius:50px;
color:white;
font-size:15px;
outline:none;
transition:.3s;
}

input:focus{
border-color:white;
}

button{
padding:18px 28px;
border:none;
background:white;
color:#111;
border-radius:50px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

.footer{
margin-top:35px;
font-size:13px;
color:#555;
opacity:0;
animation:fade 1s forwards;
animation-delay:3s;
}

.hidden{
display:none;
}

#thanks h2{
font-size:60px;
margin-bottom:20px;
}

#thanks p{
font-size:20px;
color:#999;
margin-bottom:40px;
}

#thanks button{
background:white;
}

@keyframes fade{
to{
opacity:1;
}
}

@media(max-width:700px){

h1{
font-size:50px;
letter-spacing:5px;
}

input,
button{
width:100%;
}

}

/* ============================================================
   STICKMAN — procedural (JS-computed, lerp-eased) joints, no
   CSS @keyframes. Lives on the bottom edge and randomly walks,
   runs, or throws a kickboxing combo. Left arm always mirrors
   the phase of the RIGHT leg (and vice versa) — normal
   contralateral gait.
   ============================================================ */

#stickman-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 60px;
  height: 100px;
  z-index: 99999;
  pointer-events: none;
  will-change: transform, left;
}
#stickman-wrap svg { width: 100%; height: 100%; overflow: visible; }

#stickman-wrap .limb {
  stroke: #fff;
  stroke-width: 4;
  stroke-linecap: round;
}
#stickman-wrap .head { fill: #fff; }

/* pixel transform-origin values (set inline per joint) map to the
   SVG viewBox coordinate space rather than each shape's own box */
#stickman-wrap svg .upper-arm-l,
#stickman-wrap svg .upper-arm-r,
#stickman-wrap svg .lower-arm-l,
#stickman-wrap svg .lower-arm-r,
#stickman-wrap svg .upper-leg-l,
#stickman-wrap svg .upper-leg-r,
#stickman-wrap svg .lower-leg-l,
#stickman-wrap svg .lower-leg-r {
  transform-box: view-box;
}
#stickman-wrap svg .body-group,
#stickman-wrap svg .head {
  transform-box: fill-box;
  transform-origin: center;
}

#stickman-bubble {
  position: absolute;
  bottom: 105px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  color: #111;
  font: 11px/1.2 -apple-system, sans-serif;
  padding: 4px 8px;
  border-radius: 8px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 2;
}
#stickman-bubble.show { opacity: 1; }

</style>

</head>

<body>

<div class="container">

<div id="landing">

<h1>H E Y - Y O U :)</h1>

<p class="subtitle">
Something exciting is coming.<br>
Join the waitlist.
</p>

<form id="waitlist">

<input
type="email"
placeholder="Enter your email"
required>

<button type="submit">
Join
</button>

</form>

<div class="footer">
© NOTKUDA
</div>

</div>

<div id="thanks" class="hidden">

<h2>✓</h2>

<h2>Thank You.</h2>

<p>
You're officially on the waitlist.
</p>

<button onclick="location.reload()">
Go Back
</button>

</div>

</div>

<div id="stickman-wrap">
  <div id="stickman-bubble"></div>
  <svg viewBox="0 0 60 100">
    <g class="body-group">
      <circle class="head" cx="30" cy="14" r="8"/>
      <line class="limb" x1="30" y1="22" x2="30" y2="58"/>

      <g class="upper-arm-l" style="transform-origin:30px 26px;">
        <line class="limb" x1="30" y1="26" x2="17" y2="40"/>
        <g class="lower-arm-l" style="transform-origin:17px 40px;">
          <line class="limb" x1="17" y1="40" x2="9" y2="52"/>
        </g>
      </g>

      <g class="upper-arm-r" style="transform-origin:30px 26px;">
        <line class="limb" x1="30" y1="26" x2="43" y2="40"/>
        <g class="lower-arm-r" style="transform-origin:43px 40px;">
          <line class="limb" x1="43" y1="40" x2="51" y2="52"/>
        </g>
      </g>

      <g class="upper-leg-l" style="transform-origin:30px 58px;">
        <line class="limb" x1="30" y1="58" x2="21" y2="76"/>
        <g class="lower-leg-l" style="transform-origin:21px 76px;">
          <line class="limb" x1="21" y1="76" x2="16" y2="94"/>
        </g>
      </g>

      <g class="upper-leg-r" style="transform-origin:30px 58px;">
        <line class="limb" x1="30" y1="58" x2="39" y2="76"/>
        <g class="lower-leg-r" style="transform-origin:39px 76px;">
          <line class="limb" x1="39" y1="76" x2="44" y2="94"/>
        </g>
      </g>
    </g>
  </svg>
</div>

<script>

document.getElementById("waitlist").addEventListener("submit", function (e) {

  e.preventDefault();

  document.getElementById("landing").classList.add("hidden");

  document.getElementById("thanks").classList.remove("hidden");

});

(function () {

  var wrap = document.getElementById('stickman-wrap');
  var bubble = document.getElementById('stickman-bubble');

  var joints = {
    bodyGroup: wrap.querySelector('.body-group'),
    head:      wrap.querySelector('.head'),
    upperArmL: wrap.querySelector('.upper-arm-l'),
    lowerArmL: wrap.querySelector('.lower-arm-l'),
    upperArmR: wrap.querySelector('.upper-arm-r'),
    lowerArmR: wrap.querySelector('.lower-arm-r'),
    upperLegL: wrap.querySelector('.upper-leg-l'),
    lowerLegL: wrap.querySelector('.lower-leg-l'),
    upperLegR: wrap.querySelector('.upper-leg-r'),
    lowerLegR: wrap.querySelector('.lower-leg-r')
  };

  // current smoothed angles (deg) — everything eases toward a target each frame
  var angle = {
    upperArmL: 0, lowerArmL: 18, upperArmR: 0, lowerArmR: 18,
    upperLegL: 0, lowerLegL: 6,  upperLegR: 0, lowerLegR: 6
  };

  var chatLines = ["yo", "☝️ this way", "who put this here", "brb", "😤"];
  var kickLines = ["hyah!", "kiai!", "hup!", "tch!"];

  function say(text) {
    bubble.textContent = text;
    bubble.classList.add('show');
    setTimeout(function () { bubble.classList.remove('show'); }, 900);
  }

  // -- easing helpers ---------------------------------------------------
  function lerp(a, b, k) { return a + (b - a) * k; }
  function clamp01(v) { return Math.max(0, Math.min(1, v)); }
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function easeInCubic(t) { return t * t * t; }
  function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }

  // -- world state ---------------------------------------------------------
  var pad = 10;
  var W = window.innerWidth;
  window.addEventListener('resize', function () { W = window.innerWidth; });

  var x = Math.random() * (W - 60);
  var facing = 1;
  var speed = 0;              // current px/s — drives stride frequency
  var maxSpeed = 60;
  var running = false;
  var strideBase = 18;
  var targetX = x;
  var phase = 0;               // walk/run-cycle phase accumulator

  var mode = 'pause';          // 'move' | 'kickbox' | 'pause'
  var modeStart = performance.now();
  var modeDuration = 500;

  function setMode(next, duration) {
    mode = next;
    modeStart = performance.now();
    modeDuration = duration || 0;
  }

  function pickMoveTarget(isRun) {
    running = isRun;
    targetX = pad + Math.random() * (W - 60 - pad * 2);
    if (isRun) {
      maxSpeed = 150 + Math.random() * 90;
      strideBase = 30 + Math.random() * 12;
    } else {
      maxSpeed = 40 + Math.random() * 35;
      strideBase = 14 + Math.random() * 10;
    }
    setMode('move');
  }

  function startKickbox() {
    setMode('kickbox', 1900 + Math.random() * 300);
    say(kickLines[Math.floor(Math.random() * kickLines.length)]);
  }

  function pickNextBehaviour() {
    var roll = Math.random();
    if (roll < 0.42) {
      pickMoveTarget(false);           // walk
    } else if (roll < 0.72) {
      pickMoveTarget(true);            // run
    } else if (roll < 0.92) {
      startKickbox();
    } else {
      say(chatLines[Math.floor(Math.random() * chatLines.length)]);
      setMode('pause', 400 + Math.random() * 500);
    }
  }

  function applyJoint(el, deg) {
    el.style.transform = 'rotate(' + deg + 'deg)';
  }

  var last = performance.now();

  function tick(now) {
    var dt = Math.min((now - last) / 1000, 0.05);
    last = now;

    var bodyX = 0, bodyY = 0, bodyRot = 0, bodyScaleX = 1, bodyScaleY = 1;
    var headRot = 0;

    if (mode === 'move') {
      var dx = targetX - x;
      var dist = Math.abs(dx);

      if (dist < 3) {
        setMode('pause', running ? 250 + Math.random() * 350 : 150 + Math.random() * 500);
      } else {
        speed = lerp(speed, maxSpeed, clamp01(dt * (running ? 6 : 4)));
        x += (dx > 0 ? 1 : -1) * Math.min(speed * dt, dist);
        if (dist > 6) facing = dx >= 0 ? 1 : -1;
      }

      var freqMul = running ? 0.17 : 0.09;
      phase += speed * dt * freqMul + dt * (running ? 1.1 : 0.6);

      var stride = strideBase + Math.sin(now * 0.0006) * (running ? 4 : 3);
      var kneeAmp = running ? 60 : 34;
      var armMul = running ? 1.15 : 0.85;
      var elbowAmp = running ? 34 : 20;
      var bounceAmp = running ? 7 : 3;
      var lean = running ? -12 * facing : 0;
      var smoothK = clamp01(dt * (running ? 16 : 12));

      // NOTE on pairing: hipR uses (phase+PI); armL uses the *same*
      // (phase+PI) — so the left arm always swings in lockstep with
      // the right leg, and armR mirrors hipL. That's normal gait.
      var hipL = stride * Math.sin(phase);
      var hipR = stride * Math.sin(phase + Math.PI);
      var armL = stride * armMul * Math.sin(phase + Math.PI);   // ← locked to hipR
      var armR = stride * armMul * Math.sin(phase);             // ← locked to hipL

      var kneeL = 6 + kneeAmp * Math.max(0, Math.sin(phase + Math.PI * 0.5));
      var kneeR = 6 + kneeAmp * Math.max(0, Math.sin(phase + Math.PI * 1.5));
      var elbowL = 14 + elbowAmp * Math.max(0, Math.sin(phase + Math.PI * 1.5));
      var elbowR = 14 + elbowAmp * Math.max(0, Math.sin(phase + Math.PI * 0.5));

      angle.upperLegL = lerp(angle.upperLegL, hipL, smoothK);
      angle.upperLegR = lerp(angle.upperLegR, hipR, smoothK);
      angle.lowerLegL = lerp(angle.lowerLegL, kneeL, smoothK);
      angle.lowerLegR = lerp(angle.lowerLegR, kneeR, smoothK);
      angle.upperArmL = lerp(angle.upperArmL, armL, smoothK);
      angle.upperArmR = lerp(angle.upperArmR, armR, smoothK);
      angle.lowerArmL = lerp(angle.lowerArmL, elbowL, smoothK);
      angle.lowerArmR = lerp(angle.lowerArmR, elbowR, smoothK);

      bodyY = -Math.abs(Math.sin(phase)) * bounceAmp;
      bodyRot = lean;
      headRot = -hipL * 0.1;

    } else if (mode === 'pause') {
      speed = lerp(speed, 0, clamp01(dt * 6));
      var t = now * 0.001;
      bodyY = Math.sin(t * 1.3) * 1.5;
      headRot = Math.sin(t * 0.7) * 3;
      var restArm = Math.sin(t * 0.9) * 3;

      angle.upperLegL = lerp(angle.upperLegL, 0, clamp01(dt * 6));
      angle.upperLegR = lerp(angle.upperLegR, 0, clamp01(dt * 6));
      angle.lowerLegL = lerp(angle.lowerLegL, 6, clamp01(dt * 6));
      angle.lowerLegR = lerp(angle.lowerLegR, 6, clamp01(dt * 6));
      angle.upperArmL = lerp(angle.upperArmL, restArm, clamp01(dt * 6));
      angle.upperArmR = lerp(angle.upperArmR, -restArm, clamp01(dt * 6));
      angle.lowerArmL = lerp(angle.lowerArmL, 18, clamp01(dt * 6));
      angle.lowerArmR = lerp(angle.lowerArmR, 18, clamp01(dt * 6));

      if (now - modeStart > modeDuration) pickNextBehaviour();

    } else if (mode === 'kickbox') {
      // one combo: guard -> jab -> cross -> roundhouse kick -> guard
      var p = clamp01((now - modeStart) / modeDuration);
      var guardArmL = -35, guardArmR = -35, guardElbowL = 90, guardElbowR = 90;

      angle.upperLegL = lerp(angle.upperLegL, 0, clamp01(dt * 10));
      angle.lowerLegL = lerp(angle.lowerLegL, 6, clamp01(dt * 10));

      if (p < 0.18) {
        // guard up
        var k = clamp01(p / 0.18);
        angle.upperArmL = lerp(angle.upperArmL, guardArmL, k * 0.5 + 0.1);
        angle.upperArmR = lerp(angle.upperArmR, guardArmR, k * 0.5 + 0.1);
        angle.lowerArmL = lerp(angle.lowerArmL, guardElbowL, k * 0.5 + 0.1);
        angle.lowerArmR = lerp(angle.lowerArmR, guardElbowR, k * 0.5 + 0.1);
        angle.upperLegR = lerp(angle.upperLegR, 0, clamp01(dt * 10));
        angle.lowerLegR = lerp(angle.lowerLegR, 6, clamp01(dt * 10));

      } else if (p < 0.36) {
        // left jab — snap out, snap back
        var jk = clamp01((p - 0.18) / 0.18);
        var punch = jk < 0.5 ? easeOutCubic(jk * 2) : 1 - easeInCubic((jk - 0.5) * 2);
        angle.upperArmL = lerp(guardArmL, -95, punch);
        angle.lowerArmL = lerp(guardElbowL, 8, punch);
        angle.upperArmR = guardArmR;
        angle.lowerArmR = guardElbowR;

      } else if (p < 0.56) {
        // right cross — bigger, with a little hip/shoulder rotation
        var ck = clamp01((p - 0.36) / 0.20);
        var punch2 = ck < 0.5 ? easeOutCubic(ck * 2) : 1 - easeInCubic((ck - 0.5) * 2);
        angle.upperArmR = lerp(guardArmR, -100, punch2);
        angle.lowerArmR = lerp(guardElbowR, 6, punch2);
        angle.upperArmL = guardArmL;
        angle.lowerArmL = guardElbowL;
        bodyRot = -10 * punch2 * facing;

      } else if (p < 0.85) {
        // right roundhouse kick
        var kk = clamp01((p - 0.56) / 0.29);
        var kick = kk < 0.55 ? easeOutQuad(kk / 0.55) : 1 - easeInCubic((kk - 0.55) / 0.45);
        angle.upperLegR = lerp(0, 78, kick);
        angle.lowerLegR = lerp(6, -55, kick);
        angle.upperLegL = lerp(0, -10, kick * 0.4);
        angle.upperArmL = lerp(guardArmL, -55, kick * 0.5);
        angle.upperArmR = lerp(guardArmR, 20, kick * 0.6);
        bodyRot = 18 * kick * facing;
        bodyY = -kick * 4;
        if (kk > 0.5 && kk < 0.58) say('hyah!');

      } else {
        // return to guard, settle
        var rk = clamp01((p - 0.85) / 0.15);
        angle.upperLegR = lerp(angle.upperLegR, 0, rk * 0.6 + 0.1);
        angle.lowerLegR = lerp(angle.lowerLegR, 6, rk * 0.6 + 0.1);
        angle.upperArmL = lerp(angle.upperArmL, guardArmL, rk * 0.6 + 0.1);
        angle.upperArmR = lerp(angle.upperArmR, guardArmR, rk * 0.6 + 0.1);
        angle.lowerArmL = lerp(angle.lowerArmL, guardElbowL, rk * 0.6 + 0.1);
        angle.lowerArmR = lerp(angle.lowerArmR, guardElbowR, rk * 0.6 + 0.1);
        bodyRot = lerp(bodyRot, 0, rk * 0.6);
      }

      if (p >= 1) setMode('pause', 300 + Math.random() * 400);
    }

    // -- apply to DOM --------------------------------------------------
    wrap.style.left = x + 'px';
    wrap.style.transform = 'scaleX(' + facing + ')';

    joints.bodyGroup.style.transform =
      'translateY(' + bodyY + 'px) rotate(' + bodyRot + 'deg) scale(' + bodyScaleX + ',' + bodyScaleY + ')';
    joints.head.style.transform = 'rotate(' + headRot + 'deg)';

    applyJoint(joints.upperArmL, angle.upperArmL);
    applyJoint(joints.lowerArmL, angle.lowerArmL);
    applyJoint(joints.upperArmR, angle.upperArmR);
    applyJoint(joints.lowerArmR, angle.lowerArmR);
    applyJoint(joints.upperLegL, angle.upperLegL);
    applyJoint(joints.lowerLegL, angle.lowerLegL);
    applyJoint(joints.upperLegR, angle.upperLegR);
    applyJoint(joints.lowerLegR, angle.lowerLegR);

    requestAnimationFrame(tick);
  }

  wrap.style.left = x + 'px';
  setMode('pause', 800);
  setTimeout(function () { requestAnimationFrame(tick); }, 600);

})();

</script>

</body>
</html>
