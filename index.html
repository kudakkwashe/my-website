<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOTKUDA</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#080808;
    color:white;
    font-family:'Space Grotesk',sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Background glow */
body::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#222,transparent 70%);
    filter:blur(100px);
    animation:move 10s infinite alternate;
}

@keyframes move{
    from{transform:translate(-200px,-100px);}
    to{transform:translate(200px,100px);}
}


.container{
    position:relative;
    z-index:2;
    text-align:center;
}


h1{
    font-size:70px;
    letter-spacing:8px;
    overflow:hidden;
    white-space:nowrap;
    border-right:3px solid white;
    width:0;
    animation:type 2.5s steps(10) forwards,
    blink .7s infinite;
}

@keyframes type{
    to{width:100%;}
}

@keyframes blink{
    50%{border-color:transparent;}
}


.subtitle{
    margin-top:25px;
    color:#999;
    font-size:18px;
    opacity:0;
    animation:fade 1s forwards 2s;
}


form{
    margin-top:45px;
    display:flex;
    gap:10px;
    justify-content:center;
    opacity:0;
    animation:fade 1s forwards 2.5s;
}


input{
    width:330px;
    padding:18px 22px;
    border-radius:50px;
    background:#111;
    border:1px solid #333;
    color:white;
}


button{
    border:0;
    border-radius:50px;
    padding:18px 30px;
    cursor:pointer;
    font-weight:bold;
}


.footer{
    margin-top:30px;
    color:#555;
}


.hidden{
    display:none;
}


#thanks h2{
    font-size:60px;
}


#thanks p{
    color:#999;
    margin:20px;
}


@keyframes fade{
    to{opacity:1;}
}



/* =========================
       STICKMAN
========================= */


#stickman{
    position:fixed;
    width:70px;
    height:110px;
    left:50%;
    bottom:100%;
    z-index:99;
}


svg{
    width:100%;
}


.line{
    stroke:white;
    stroke-width:4;
    stroke-linecap:round;
}


.head{
    fill:white;
}



/* falling from roof */

.fall{
    animation:fall 2s forwards ease-in;
}


@keyframes fall{

0%{
bottom:100%;
transform:rotate(0);
}

70%{
bottom:50%;
transform:rotate(360deg);
}

100%{
bottom:110px;
transform:rotate(360deg);
}

}



/* walking */

.walk{
    animation:walk 15s linear forwards;
}


@keyframes walk{

from{
left:-50px;
}

to{
left:calc(50% - 150px);
}

}



/* legs movement */

.walk .leg1{
animation:legs .4s infinite alternate;
}

.walk .leg2{
animation:legs .4s infinite alternate-reverse;
}


@keyframes legs{
from{
transform:rotate(25deg);
}

to{
transform:rotate(-25deg);
}
}



/* sitting */

.sit{
    left:calc(50% - 150px)!important;
}


.sit .leg1{
transform:rotate(70deg);
}

.sit .leg2{
transform:rotate(-70deg);
}



/* computer */

#computer{
position:fixed;
bottom:100px;
left:calc(50% - 110px);
width:70px;
height:50px;
background:#222;
border:2px solid white;
display:none;
}


#computer:after{
content:"";
position:absolute;
width:30px;
height:5px;
background:white;
bottom:-10px;
left:18px;
}



</style>

</head>


<body>


<div class="container">


<div id="landing">

<h1>HEY-YOU :)</h1>

<p class="subtitle">
Something exciting is coming.<br>
Join the waitlist.
</p>


<form id="form">

<input type="email" placeholder="Enter your email" required>

<button>
JOIN
</button>

</form>


<div class="footer">
© NOTKUDA
</div>

</div>



<div id="thanks" class="hidden">

<h2>✓</h2>

<h2>Thank You</h2>

<p>
You're officially on the waitlist.
</p>

<button onclick="location.reload()">
Go Back
</button>

</div>


</div>




<!-- STICKMAN -->

<div id="stickman">

<svg viewBox="0 0 70 110">

<circle class="head" cx="35" cy="15" r="10"/>

<line class="line" x1="35" y1="25" x2="35" y2="65"/>


<line class="line arm" x1="35" y1="35" x2="15" y2="55"/>

<line class="line arm" x1="35" y1="35" x2="55" y2="55"/>


<line class="line leg1" x1="35" y1="65" x2="15" y2="100"/>

<line class="line leg2" x1="35" y1="65" x2="55" y2="100"/>


</svg>

</div>


<div id="computer"></div>



<script>


// Form

document.getElementById("form")
.addEventListener("submit",function(e){

e.preventDefault();

document.getElementById("landing")
.classList.add("hidden");

document.getElementById("thanks")
.classList.remove("hidden");

});





// Stickman animation

let man=document.getElementById("stickman");

let computer=document.getElementById("computer");


// jump from roof

setTimeout(()=>{

man.classList.add("fall");


},3000);



setTimeout(()=>{


man.classList.remove("fall");

man.classList.add("walk");


},5200);



setTimeout(()=>{


man.classList.remove("walk");

man.classList.add("sit");

computer.style.display="block";


},21000);



</script>


</body>
</html>
