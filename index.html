<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOTKUDA</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#080808;
color:white;
font-family:'Space Grotesk',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:800px;
height:800px;
background:radial-gradient(circle,#181818 0%,transparent 70%);
filter:blur(90px);
animation:move 10s ease-in-out infinite alternate;
}

@keyframes move{
0%{transform:translate(-200px,-100px);}
100%{transform:translate(200px,120px);}
}

.container{
position:relative;
z-index:2;
width:90%;
max-width:650px;
text-align:center;
}

h1{
font-size:72px;
font-weight:700;
letter-spacing:8px;
display:inline-block;
overflow:hidden;
white-space:nowrap;
border-right:3px solid white;
width:0;
animation:
typing 2.5s steps(7,end) forwards,
blink .8s infinite;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
50%{border-color:transparent;}
}

.subtitle{
margin-top:25px;
color:#9f9f9f;
font-size:18px;
opacity:0;
animation:fade 1s forwards;
animation-delay:2.2s;
}

form{
margin-top:45px;
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
opacity:0;
animation:fade 1s forwards;
animation-delay:2.6s;
}

input{
width:340px;
padding:18px 22px;
background:#131313;
border:1px solid #2b2b2b;
border-radius:50px;
color:white;
font-size:15px;
outline:none;
transition:.3s;
}

input:focus{
border-color:white;
}

button{
padding:18px 28px;
border:none;
background:white;
color:#111;
border-radius:50px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

.footer{
margin-top:35px;
font-size:13px;
color:#555;
opacity:0;
animation:fade 1s forwards;
animation-delay:3s;
}

.hidden{
display:none;
}

#thanks h2{
font-size:60px;
margin-bottom:20px;
}

#thanks p{
font-size:20px;
color:#999;
margin-bottom:40px;
}

#thanks button{
background:white;
}

@keyframes fade{
to{
opacity:1;
}
}

@media(max-width:700px){

h1{
font-size:50px;
letter-spacing:5px;
}

input,
button{
width:100%;
}

}

/* ============================================================
   STICKMAN — jointed limbs (upper + lower segments) so poses
   can bend at elbows/knees instead of swinging as rigid rods.
   ============================================================ */

#stickman-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 60px;
  height: 100px;
  z-index: 99999;
  pointer-events: none;
  --walk-dur: 0.36s;
  --stride: 22deg;
}
#stickman-wrap svg { width: 100%; height: 100%; overflow: visible; }

#stickman-wrap .limb {
  stroke: #fff;
  stroke-width: 4;
  stroke-linecap: round;
}
#stickman-wrap .head { fill: #fff; }

/* pixel transform-origin values (set inline per joint) should map
   to the SVG viewBox coordinate space, not each shape's own box */
#stickman-wrap svg .upper-arm-l,
#stickman-wrap svg .upper-arm-r,
#stickman-wrap svg .lower-arm-l,
#stickman-wrap svg .lower-arm-r,
#stickman-wrap svg .upper-leg-l,
#stickman-wrap svg .upper-leg-r,
#stickman-wrap svg .lower-leg-l,
#stickman-wrap svg .lower-leg-r {
  transform-box: view-box;
  transition: transform .25s cubic-bezier(.4,0,.2,1);
}
#stickman-wrap svg .body-group,
#stickman-wrap svg .head {
  transform-box: fill-box;
  transform-origin: center;
}

/* ---------- idle: gentle breathing instead of a frozen pose ---------- */
@keyframes breathe {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-1.5px); }
}
@keyframes idleSway {
  0%, 100% { transform: rotate(0deg); }
  50%      { transform: rotate(2deg); }
}
#stickman-wrap.idle .body-group { animation: breathe 2.4s ease-in-out infinite; }
#stickman-wrap.idle .head       { animation: idleSway 3.6s ease-in-out infinite; }

/* ---------- walking: phase-shifted opposite limbs via negative delay ---------- */
@keyframes hipSwing {
  0%   { transform: rotate(calc(var(--stride) * -1)); }
  50%  { transform: rotate(var(--stride)); }
  100% { transform: rotate(calc(var(--stride) * -1)); }
}
@keyframes kneeBend {
  0%   { transform: rotate(6deg); }
  12%  { transform: rotate(42deg); }
  50%  { transform: rotate(2deg); }
  88%  { transform: rotate(34deg); }
  100% { transform: rotate(6deg); }
}
@keyframes shoulderSwing {
  0%   { transform: rotate(var(--stride)); }
  50%  { transform: rotate(calc(var(--stride) * -1)); }
  100% { transform: rotate(var(--stride)); }
}
@keyframes elbowSwing {
  0%   { transform: rotate(18deg); }
  50%  { transform: rotate(4deg); }
  100% { transform: rotate(18deg); }
}
@keyframes bodyBounce {
  0%, 100% { transform: translateY(0); }
  25%      { transform: translateY(-2.5px); }
  50%      { transform: translateY(0.5px); }
  75%      { transform: translateY(-2.5px); }
}
@keyframes headBob {
  0%, 50%, 100% { transform: rotate(0deg); }
  25%           { transform: rotate(-4deg); }
  75%           { transform: rotate(4deg); }
}

#stickman-wrap.walking .upper-leg-l { animation: hipSwing var(--walk-dur) ease-in-out infinite; }
#stickman-wrap.walking .upper-leg-r { animation: hipSwing var(--walk-dur) ease-in-out infinite; animation-delay: calc(var(--walk-dur) / -2); }
#stickman-wrap.walking .lower-leg-l { animation: kneeBend var(--walk-dur) ease-in-out infinite; }
#stickman-wrap.walking .lower-leg-r { animation: kneeBend var(--walk-dur) ease-in-out infinite; animation-delay: calc(var(--walk-dur) / -2); }
#stickman-wrap.walking .upper-arm-l { animation: shoulderSwing var(--walk-dur) ease-in-out infinite; animation-delay: calc(var(--walk-dur) / -2); }
#stickman-wrap.walking .upper-arm-r { animation: shoulderSwing var(--walk-dur) ease-in-out infinite; }
#stickman-wrap.walking .lower-arm-l { animation: elbowSwing var(--walk-dur) ease-in-out infinite; animation-delay: calc(var(--walk-dur) / -2); }
#stickman-wrap.walking .lower-arm-r { animation: elbowSwing var(--walk-dur) ease-in-out infinite; }
#stickman-wrap.walking .body-group  { animation: bodyBounce var(--walk-dur) ease-in-out infinite; }
#stickman-wrap.walking .head        { animation: headBob calc(var(--walk-dur) * 2) ease-in-out infinite; }

/* ---------- jump: squash before takeoff, tuck mid-air, squash on landing ---------- */
@keyframes jumpArc {
  0%   { transform: translateY(0)    rotate(0deg)   scale(1, 1); }
  14%  { transform: translateY(5px)  rotate(0deg)   scale(1.12, 0.85); }
  45%  { transform: translateY(-72px) rotate(180deg) scale(0.9, 1.06); }
  70%  { transform: translateY(-72px) rotate(360deg) scale(0.9, 1.06); }
  90%  { transform: translateY(4px)  rotate(360deg) scale(1.15, 0.85); }
  100% { transform: translateY(0)    rotate(360deg) scale(1, 1); }
}
@keyframes legTuck {
  0%, 100% { transform: rotate(0deg); }
  45%, 70% { transform: rotate(22deg); }
}
@keyframes kneeTuck {
  0%, 100% { transform: rotate(4deg); }
  45%, 70% { transform: rotate(65deg); }
}
#stickman-wrap.jumping .body-group  { animation: jumpArc 0.7s cubic-bezier(.36,.07,.19,.97) forwards; }
#stickman-wrap.jumping .upper-leg-l,
#stickman-wrap.jumping .upper-leg-r { animation: legTuck 0.7s ease-in-out forwards; }
#stickman-wrap.jumping .lower-leg-l,
#stickman-wrap.jumping .lower-leg-r { animation: kneeTuck 0.7s ease-in-out forwards; }
#stickman-wrap.jumping .upper-arm-l { transform: rotate(-40deg); }
#stickman-wrap.jumping .upper-arm-r { transform: rotate(40deg); }

/* ---------- spin: arms fly out for momentum ---------- */
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
#stickman-wrap.spinning .body-group { animation: spin 0.5s cubic-bezier(.45,0,.55,1) 2; }
#stickman-wrap.spinning .upper-arm-l { transform: rotate(-75deg); }
#stickman-wrap.spinning .upper-arm-r { transform: rotate(75deg); }
#stickman-wrap.spinning .lower-arm-l { transform: rotate(20deg); }
#stickman-wrap.spinning .lower-arm-r { transform: rotate(-20deg); }

/* ---------- sit: bent knees, resting arms, subtle breathing ---------- */
#stickman-wrap.sitting .upper-leg-l { transform: rotate(78deg); }
#stickman-wrap.sitting .lower-leg-l { transform: rotate(-72deg); }
#stickman-wrap.sitting .upper-leg-r { transform: rotate(-78deg); }
#stickman-wrap.sitting .lower-leg-r { transform: rotate(72deg); }
#stickman-wrap.sitting .upper-arm-l { transform: rotate(-28deg); }
#stickman-wrap.sitting .upper-arm-r { transform: rotate(28deg); }
#stickman-wrap.sitting .lower-arm-l { transform: rotate(22deg); }
#stickman-wrap.sitting .lower-arm-r { transform: rotate(-22deg); }
#stickman-wrap.sitting .body-group  { animation: breathe 1.6s ease-in-out infinite; }

/* ---------- faceplant: topple forward with flailing arms ---------- */
@keyframes fall {
  0%   { transform: rotate(0deg)  translateY(0); }
  55%  { transform: rotate(96deg) translateY(9px); }
  75%  { transform: rotate(84deg) translateY(6px); }
  100% { transform: rotate(90deg) translateY(9px); }
}
#stickman-wrap.faceplant .body-group  { animation: fall 0.55s cubic-bezier(.55,0,.85,.35) forwards; }
#stickman-wrap.faceplant .upper-arm-l { transform: rotate(-100deg); }
#stickman-wrap.faceplant .upper-arm-r { transform: rotate(-70deg); }
#stickman-wrap.faceplant .lower-arm-l { transform: rotate(-15deg); }
#stickman-wrap.faceplant .lower-arm-r { transform: rotate(20deg); }

/* ---------- speech bubble ---------- */
#stickman-bubble {
  position: absolute;
  bottom: 105px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  color: #111;
  font: 11px/1.2 -apple-system, sans-serif;
  padding: 4px 8px;
  border-radius: 8px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s;
}
#stickman-bubble.show { opacity: 1; }

</style>

</head>

<body>

<div class="container">

<div id="landing">

<h1>H E Y - Y O U :)</h1>

<p class="subtitle">
Something exciting is coming.<br>
Join the waitlist.
</p>

<form id="waitlist">

<input
type="email"
placeholder="Enter your email"
required>

<button type="submit">
Join
</button>

</form>

<div class="footer">
© NOTKUDA
</div>

</div>

<div id="thanks" class="hidden">

<h2>✓</h2>

<h2>Thank You.</h2>

<p>
You're officially on the waitlist.
</p>

<button onclick="location.reload()">
Go Back
</button>

</div>

</div>

<div id="stickman-wrap" class="idle">
  <div id="stickman-bubble"></div>
  <svg viewBox="0 0 60 100">
    <g class="body-group">
      <circle class="head" cx="30" cy="14" r="8"/>
      <line class="limb" x1="30" y1="22" x2="30" y2="58"/>

      <g class="upper-arm-l" style="transform-origin:30px 26px;">
        <line class="limb" x1="30" y1="26" x2="17" y2="40"/>
        <g class="lower-arm-l" style="transform-origin:17px 40px;">
          <line class="limb" x1="17" y1="40" x2="9" y2="52"/>
        </g>
      </g>

      <g class="upper-arm-r" style="transform-origin:30px 26px;">
        <line class="limb" x1="30" y1="26" x2="43" y2="40"/>
        <g class="lower-arm-r" style="transform-origin:43px 40px;">
          <line class="limb" x1="43" y1="40" x2="51" y2="52"/>
        </g>
      </g>

      <g class="upper-leg-l" style="transform-origin:30px 58px;">
        <line class="limb" x1="30" y1="58" x2="21" y2="76"/>
        <g class="lower-leg-l" style="transform-origin:21px 76px;">
          <line class="limb" x1="21" y1="76" x2="16" y2="94"/>
        </g>
      </g>

      <g class="upper-leg-r" style="transform-origin:30px 58px;">
        <line class="limb" x1="30" y1="58" x2="39" y2="76"/>
        <g class="lower-leg-r" style="transform-origin:39px 76px;">
          <line class="limb" x1="39" y1="76" x2="44" y2="94"/>
        </g>
      </g>
    </g>
  </svg>
</div>

<script>

document.getElementById("waitlist").addEventListener("submit", function (e) {

  e.preventDefault();

  document.getElementById("landing").classList.add("hidden");

  document.getElementById("thanks").classList.remove("hidden");

});

(function () {
  var el = document.getElementById('stickman-wrap');
  var bubble = document.getElementById('stickman-bubble');
  var x = 100;
  var facing = 1; // 1 = right, -1 = left
  var busy = false;
  var lines = ["whee!", "parkour!", "yeet", "brb", "who put this here", "😤", "not today gravity"];

  function easeInOutQuad(t) {
    return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  }

  function setX(px) {
    x = px;
    el.style.left = x + 'px';
  }
  setX(x);

  function say(text) {
    bubble.textContent = text;
    bubble.classList.add('show');
    setTimeout(function () { bubble.classList.remove('show'); }, 1200);
  }

  function faceDir(dir) {
    facing = dir;
    el.style.transform = 'scaleX(' + dir + ')';
  }

  function walkTo(targetX, callback) {
    var startX = x;
    var dist = targetX - startX;
    faceDir(dist >= 0 ? 1 : -1);

    // a little randomness per walk so the gait never looks identical twice
    var strideDeg = 16 + Math.random() * 12;     // 16–28deg swing amplitude
    var stepSecs = 0.3 + Math.random() * 0.14;    // 0.30–0.44s per step cycle
    el.style.setProperty('--stride', strideDeg + 'deg');
    el.style.setProperty('--walk-dur', stepSecs + 's');

    el.className = 'walking';
    var duration = Math.max(Math.abs(dist) * 7, 250); // ms, scales with distance
    var startTime = null;

    function step(ts) {
      if (!startTime) startTime = ts;
      var t = Math.min((ts - startTime) / duration, 1);
      var eased = easeInOutQuad(t);
      setX(startX + dist * eased);
      if (t < 1) {
        requestAnimationFrame(step);
      } else {
        callback && callback();
      }
    }
    requestAnimationFrame(step);
  }

  function doAction(callback) {
    var actions = ['jump', 'spin', 'sit', 'faceplant', 'shout'];
    var action = actions[Math.floor(Math.random() * actions.length)];

    if (action === 'jump') {
      el.className = 'jumping';
      setTimeout(function () { el.className = 'idle'; callback(); }, 700);
    } else if (action === 'spin') {
      el.className = 'spinning';
      setTimeout(function () { el.className = 'idle'; callback(); }, 1000);
    } else if (action === 'sit') {
      el.className = 'sitting';
      say("brb");
      setTimeout(function () { el.className = 'idle'; callback(); }, 1500);
    } else if (action === 'faceplant') {
      el.className = 'faceplant';
      setTimeout(function () {
        el.className = 'idle';
        el.style.transform = 'scaleX(' + facing + ')';
        callback();
      }, 850);
    } else {
      say(lines[Math.floor(Math.random() * lines.length)]);
      el.className = 'idle';
      setTimeout(callback, 500);
    }
  }

  function loop() {
    if (busy) return;
    busy = true;
    var maxX = window.innerWidth - 60;
    var target = Math.random() * maxX;
    walkTo(target, function () {
      el.className = 'idle';
      if (Math.random() < 0.6) {
        doAction(function () {
          busy = false;
          setTimeout(loop, 200 + Math.random() * 800);
        });
      } else {
        busy = false;
        setTimeout(loop, 200 + Math.random() * 800);
      }
    });
  }

  // kick things off after a short delay
  setTimeout(loop, 1000);
})();

</script>

</body>
</html>
